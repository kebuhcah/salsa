<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CoMPAS3D Salsa Viewer</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --accent: #e05a2b;
      --accent2: #f0a070;
      --text: #e8eaf0;
      --muted: #7880a0;
      --border: #2d3150;
      --together: #e05a2b;
      --leader: #4a9eff;
      --follower: #c77dff;
      --error: #ff6b6b;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 12px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: var(--accent2);
      white-space: nowrap;
    }

    #seq-select {
      flex: 1;
      max-width: 420px;
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 0.9rem;
      cursor: pointer;
    }

    #track-toggles {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .track-btn {
      padding: 4px 10px;
      border-radius: 4px;
      border: 1px solid transparent;
      font-size: 0.78rem;
      cursor: pointer;
      opacity: 0.45;
      transition: opacity 0.15s;
    }
    .track-btn.active { opacity: 1; }
    .track-btn[data-track="Together"]          { background: #2a1510; border-color: var(--together); color: var(--together); }
    .track-btn[data-track="Separate_Leader"]   { background: #0d1e33; border-color: var(--leader);   color: var(--leader); }
    .track-btn[data-track="Separate_Follower"] { background: #1e0f2e; border-color: var(--follower); color: var(--follower); }
    .track-btn[data-track="Errors"]            { background: #2e1010; border-color: var(--error);    color: var(--error); }

    main {
      display: flex;
      flex: 1;
      overflow: hidden;
      gap: 0;
    }

    /* ── left panel ── */
    #left {
      display: flex;
      flex-direction: column;
      flex: 1 1 0;
      min-width: 0;
      padding: 16px;
      gap: 14px;
    }

    #video-wrap {
      flex: 1;
      background: #000;
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
      aspect-ratio: 1 / 1;
      align-self: center;
    }

    #player {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    #now-playing {
      flex-shrink: 0;
      min-height: 80px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    #now-label {
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    #now-moves {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .now-move {
      font-size: 1.05rem;
      font-weight: 500;
      line-height: 1.3;
    }
    .now-move.together  { color: var(--together); }
    .now-move.leader    { color: var(--leader); }
    .now-move.follower  { color: var(--follower); }
    .now-move.error     { color: var(--error); }

    #status {
      font-size: 0.85rem;
      color: var(--muted);
      font-style: italic;
    }

    /* ── right panel ── */
    #right {
      width: 320px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      border-left: 1px solid var(--border);
      background: var(--surface);
    }

    #right-header {
      padding: 10px 14px;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #annot-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
      scroll-behavior: smooth;
    }

    #annot-list::-webkit-scrollbar { width: 4px; }
    #annot-list::-webkit-scrollbar-track { background: transparent; }
    #annot-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .annot-row {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding: 7px 14px;
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: background 0.1s;
    }
    .annot-row:hover { background: var(--surface2); }
    .annot-row.active {
      background: var(--surface2);
    }
    .annot-row.active.together  { border-left-color: var(--together); }
    .annot-row.active.leader    { border-left-color: var(--leader); }
    .annot-row.active.follower  { border-left-color: var(--follower); }
    .annot-row.active.error     { border-left-color: var(--error); }

    .annot-time {
      font-size: 0.72rem;
      color: var(--muted);
      white-space: nowrap;
      padding-top: 1px;
      min-width: 50px;
      font-variant-numeric: tabular-nums;
    }
    .annot-row.active .annot-time { color: var(--accent2); }

    .annot-text {
      font-size: 0.82rem;
      line-height: 1.4;
      color: var(--text);
      opacity: 0.7;
    }
    .annot-row.active .annot-text { opacity: 1; }

    .annot-badge {
      display: inline-block;
      font-size: 0.62rem;
      letter-spacing: 0.06em;
      padding: 1px 5px;
      border-radius: 3px;
      margin-right: 4px;
      vertical-align: middle;
      opacity: 0.8;
    }
    .badge-leader   { background: #0d1e33; color: var(--leader); }
    .badge-follower { background: #1e0f2e; color: var(--follower); }
    .badge-error    { background: #2e1010; color: var(--error); }

    .empty-state {
      padding: 40px 20px;
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      line-height: 1.6;
    }

    /* ── tabs ── */
    #tabs {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }
    .tab-btn {
      padding: 5px 14px;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 5px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .tab-btn.active {
      background: var(--surface2);
      color: var(--text);
      border-color: var(--accent2);
    }

    /* ── viewer controls (hide on graph tab) ── */
    #viewer-controls {
      display: flex;
      align-items: center;
      gap: 16px;
      flex: 1;
      min-width: 0;
    }
    #viewer-controls.hidden,
    #graph-controls.hidden { display: none; }

    /* ── graph panel ── */
    #graph-panel {
      display: none;
      flex: 1;
      flex-direction: column;
      overflow: hidden;
    }
    #graph-panel.active {
      display: flex;
    }
    #viewer-panel {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    #viewer-panel.hidden {
      display: none;
    }

    #graph-controls {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    #graph-controls label {
      font-size: 0.82rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }
    #graph-controls input[type=range] {
      accent-color: var(--accent);
      width: 100px;
    }
    #graph-controls input[type=checkbox] {
      accent-color: var(--accent);
    }

    #graph-svg-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    #graph-svg-wrap svg {
      width: 100%;
      height: 100%;
    }

    .graph-legend {
      position: absolute;
      bottom: 16px;
      left: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.73rem;
      color: var(--muted);
      pointer-events: none;
    }
    .graph-legend-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
    }
    .graph-legend-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .graph-tooltip {
      position: absolute;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 11px;
      font-size: 0.78rem;
      color: var(--text);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.1s;
      max-width: 220px;
      line-height: 1.5;
    }

    /* ── compact notation ── */
    .annot-body {
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 0;
      flex: 1;
    }
    .cn {
      display: flex;
      align-items: center;
      gap: 3px;
      flex-wrap: wrap;
      font-family: 'SF Mono', 'Fira Code', ui-monospace, monospace;
      font-size: 0.72rem;
      line-height: 1;
      opacity: 0.6;
      transition: opacity 0.1s;
    }
    .annot-row.active .cn { opacity: 1; }
    .cn-hold {
      padding: 1px 4px;
      border-radius: 3px;
      font-weight: 700;
      font-size: 0.66rem;
      border: 1px solid;
    }
    .cn-hold.open      { color: #7fbf7a; border-color: #3a5838; background: #182618; }
    .cn-hold.crossed   { color: #e08050; border-color: #6a3018; background: #251510; }
    .cn-hold.closed    { color: #5a9eff; border-color: #1a4080; background: #0d1a30; }
    .cn-hold.hl_left   { color: #c077ef; border-color: #602880; background: #1e0f2e; }
    .cn-hold.hl_right  { color: #c077ef; border-color: #602880; background: #1e0f2e; }
    .cn-hold.embrace   { color: #f0aa40; border-color: #805020; background: #281a08; }
    .cn-hold.shadow    { color: #8090b0; border-color: #405060; background: #151e26; }
    .cn-move  { font-weight: 700; font-size: 0.78rem; letter-spacing: 0.02em; }
    .cn-fturn { color: #c077ef; font-size: 0.82rem; }
    .cn-lturn { color: #5a9eff; font-size: 0.82rem; }
    .cn-transition { color: var(--muted); font-size: 0.7rem; }
    .cn-dec   { color: var(--muted); font-size: 0.68rem; font-style: italic; }
    /* in now-playing panel, scale up the compact notation */
    #now-moves .cn {
      font-size: 0.85rem;
      opacity: 1;
      margin-top: 2px;
    }
    #now-moves .cn-move { font-size: 0.9rem; }
    #now-moves .cn-hold { font-size: 0.78rem; }

    /* ── beat counter ── */
    #beat-bar {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 6px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      flex-shrink: 0;
    }
    #beat-bar.visible { display: flex; }
    #beat-pips {
      display: flex;
      gap: 5px;
      flex: 1;
      justify-content: center;
    }
    .beat-pip {
      width: 30px; height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 600;
      border: 1.5px solid var(--border);
      color: var(--muted);
      transition: background 0.06s, color 0.06s, border-color 0.06s;
      cursor: default;
    }
    .beat-pip.on2-accent {
      border-color: var(--leader);
      color: var(--leader);
    }
    .beat-pip.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .beat-pip.on2-accent.active {
      background: var(--leader);
      border-color: var(--leader);
    }
    /* beats 4 and 8 are the "pause" counts — slightly muted */
    .beat-pip.pause { opacity: 0.5; }
    #on2-toggle {
      font-size: 0.72rem;
      padding: 3px 9px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }
    #on2-toggle.on2 {
      border-color: var(--leader);
      color: var(--leader);
      background: #0d1e33;
    }

    /* ── shared hover tooltip ── */
    #app-tooltip {
      position: fixed;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 5px 10px;
      font-size: 0.76rem;
      color: var(--text);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.08s;
      z-index: 300;
      max-width: 300px;
      line-height: 1.5;
    }

    /* ── mobile layout ── */
    @media (max-width: 700px) {
      body {
        height: auto;
        min-height: 100dvh;
        overflow-y: auto;
      }

      header {
        flex-wrap: wrap;
        gap: 8px;
        padding: 10px 12px;
      }

      #tabs { order: 2; }

      #viewer-controls {
        order: 3;
        width: 100%;
        flex-wrap: wrap;
        gap: 8px;
        max-width: 100%;
      }

      #seq-select { max-width: 100%; width: 100%; }

      #track-toggles { display: none; }
      #tabs { display: none; }

      main {
        overflow: visible;
        flex: none;
      }

      #viewer-panel {
        flex-direction: column;
        overflow: visible;
        height: auto;
      }

      #left {
        flex: none;
        padding: 10px;
        gap: 10px;
      }

      #video-wrap {
        flex: none;
        aspect-ratio: 1 / 1;
        height: auto;
      }

      #now-playing { display: none; }

      /* side panel becomes bottom panel with fixed-height scroll */
      #right {
        width: 100%;
        border-left: none;
        border-top: 1px solid var(--border);
        height: 45vh;
        max-height: none;
      }

      #annot-list {
        overflow-y: auto;
      }

      /* smaller beat pips */
      .beat-pip { width: 24px; height: 24px; font-size: 0.65rem; }
      #beat-pips { gap: 3px; }

      /* graph needs an explicit height since body no longer constrains it */
      #graph-panel { height: 80vh; flex: none; }
      .graph-legend { font-size: 0.65rem; padding: 7px 10px; }
    }
  </style>
</head>
<body>

<header>
  <h1>CoMPAS3D Salsa</h1>
  <div id="tabs">
    <button class="tab-btn active" data-tab="viewer">Video Viewer</button>
    <button class="tab-btn" data-tab="graph">Move Graph</button>
  </div>
  <div id="viewer-controls">
    <select id="seq-select">
      <option value="">— select a sequence —</option>
    </select>
    <div id="track-toggles">
      <button class="track-btn active" data-track="Together">Together</button>
      <button class="track-btn active" data-track="Separate_Leader">Leader</button>
      <button class="track-btn active" data-track="Separate_Follower">Follower</button>
      <button class="track-btn" data-track="Errors">Errors</button>
    </div>
  </div>
  <div id="graph-controls" class="hidden">
    <label>Min weight: <span id="weight-val">5</span>
      <input type="range" id="weight-slider" min="1" max="50" value="5">
    </label>
    <label><input type="checkbox" id="selfloop-toggle" checked> Self-loops</label>
  </div>
</header>

<main>
  <div id="viewer-panel">
    <div id="left">
      <div id="video-wrap">
        <video id="player" controls></video>
      </div>
      <div id="beat-bar">
        <div id="beat-pips"></div>
        <button id="on2-toggle" title="Toggle on-two mode — highlights beat 2 as the break">on-1</button>
      </div>
      <div id="now-playing">
        <div id="now-label">Now playing</div>
        <div id="now-moves"><div id="status">Select a sequence above to begin.</div></div>
      </div>
    </div>
    <div id="right">
      <div id="right-header">All annotations</div>
      <div id="annot-list"><div class="empty-state">No sequence loaded.</div></div>
    </div>
  </div>
  <div id="graph-panel">
    <div id="graph-svg-wrap">
      <div class="graph-tooltip" id="graph-tooltip"></div>
    </div>
    <div class="graph-legend" id="graph-legend"></div>
  </div>
</main>

<div id="app-tooltip"></div>

<script>
  // ── tab switching ────────────────────────────────────────────────────────────
  const viewerPanel   = document.getElementById('viewer-panel');
  const graphPanel    = document.getElementById('graph-panel');
  const viewerCtrls   = document.getElementById('viewer-controls');
  const graphCtrls    = document.getElementById('graph-controls');

  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const tab = btn.dataset.tab;
      viewerPanel.classList.toggle('hidden',  tab !== 'viewer');
      graphPanel.classList.toggle('active',   tab === 'graph');
      viewerCtrls.classList.toggle('hidden',  tab !== 'viewer');
      graphCtrls.classList.toggle('hidden',   tab !== 'graph');
      if (tab === 'graph' && !graphInitialised) initGraph();
    });
  });

  // ── graph data (inlined from graph.json) ─────────────────────────────────────
  const GRAPH_DATA = {"nodes":["Other","Open Break","Turn","Copa","Change of Directions","Hand Throw","Suzy Q","Walks Around","Enchufla","Arm Lock","Lasso","Natural Top","Check","XBL","Comb","Basic"],"edges":[{"from":"Basic","to":"Turn","weight":40},{"from":"Turn","to":"Other","weight":17},{"from":"Other","to":"Basic","weight":22},{"from":"Basic","to":"Basic","weight":106},{"from":"Turn","to":"Basic","weight":46},{"from":"Basic","to":"XBL","weight":50},{"from":"XBL","to":"Turn","weight":42},{"from":"Turn","to":"Hand Throw","weight":9},{"from":"Hand Throw","to":"Hand Throw","weight":12},{"from":"Hand Throw","to":"Basic","weight":4},{"from":"Turn","to":"Turn","weight":26},{"from":"XBL","to":"Basic","weight":28},{"from":"Hand Throw","to":"Turn","weight":6},{"from":"Basic","to":"Other","weight":16},{"from":"Other","to":"Other","weight":8},{"from":"Other","to":"Turn","weight":16},{"from":"Basic","to":"Hand Throw","weight":6},{"from":"Basic","to":"Suzy Q","weight":3},{"from":"Suzy Q","to":"Suzy Q","weight":7},{"from":"Suzy Q","to":"Basic","weight":4},{"from":"XBL","to":"Check","weight":8},{"from":"Check","to":"Basic","weight":2},{"from":"Hand Throw","to":"XBL","weight":16},{"from":"XBL","to":"XBL","weight":227},{"from":"Turn","to":"XBL","weight":22},{"from":"XBL","to":"Comb","weight":36},{"from":"Open Break","to":"XBL","weight":6},{"from":"Check","to":"XBL","weight":5},{"from":"Comb","to":"XBL","weight":32},{"from":"XBL","to":"Hand Throw","weight":14},{"from":"XBL","to":"Copa","weight":20},{"from":"Copa","to":"XBL","weight":28},{"from":"XBL","to":"Other","weight":26},{"from":"XBL","to":"Lasso","weight":2},{"from":"XBL","to":"Walks Around","weight":8},{"from":"Other","to":"XBL","weight":23},{"from":"Walks Around","to":"XBL","weight":11},{"from":"Turn","to":"Copa","weight":4},{"from":"Natural Top","to":"XBL","weight":5},{"from":"Other","to":"Copa","weight":3},{"from":"Turn","to":"Comb","weight":5},{"from":"XBL","to":"Open Break","weight":3},{"from":"Comb","to":"Walks Around","weight":3},{"from":"Copa","to":"Other","weight":2},{"from":"Other","to":"Hand Throw","weight":2},{"from":"Comb","to":"Other","weight":4},{"from":"XBL","to":"Arm Lock","weight":3},{"from":"Arm Lock","to":"XBL","weight":3},{"from":"XBL","to":"Natural Top","weight":4},{"from":"Hand Throw","to":"Copa","weight":2},{"from":"Natural Top","to":"Natural Top","weight":4},{"from":"Comb","to":"Turn","weight":3}]};

  const NODE_COLOR = {
    'XBL':                '#e05a2b',
    'Basic':              '#7880a0',
    'Side Basic':         '#7880a0',
    'Cross-Back Basic':   '#7880a0',
    'Back Basic':         '#7880a0',
    'Turn':               '#4a9eff',
    'Copa':               '#c77dff',
    'Comb':               '#f0c040',
    'Hand Throw':         '#ff6b6b',
    'Natural Top':        '#40c8a8',
    'Walks Around':       '#50c878',
    'Suzy Q':             '#ffaa40',
    'Check':              '#80c8ff',
    'Open Break':         '#ff9090',
    'Lasso':              '#ff80c0',
    'Arm Lock':           '#c0a060',
    'Change of Directions': '#9090ff',
    'Enchufla':           '#ff60a0',
    'Other':              '#4a4e6a',
  };

  // ── graph initialisation ─────────────────────────────────────────────────────
  let graphInitialised = false;
  let simulation = null;

  function initGraph() {
    graphInitialised = true;

    const wrap    = document.getElementById('graph-svg-wrap');
    const tooltip = document.getElementById('graph-tooltip');

    // compute per-node total weight for sizing
    const nodeWeight = {};
    for (const e of GRAPH_DATA.edges) {
      nodeWeight[e.from] = (nodeWeight[e.from] || 0) + e.weight;
      nodeWeight[e.to]   = (nodeWeight[e.to]   || 0) + e.weight;
    }
    const maxW = Math.max(...Object.values(nodeWeight));
    const nodeR = name => 10 + 22 * Math.sqrt((nodeWeight[name] || 1) / maxW);

    // build legend
    const legendEl = document.getElementById('graph-legend');
    const legendItems = [
      ['XBL',         NODE_COLOR['XBL']],
      ['Basic',       NODE_COLOR['Basic']],
      ['Turn',        NODE_COLOR['Turn']],
      ['Copa',        NODE_COLOR['Copa']],
      ['Comb',        NODE_COLOR['Comb']],
      ['Hand Throw',  NODE_COLOR['Hand Throw']],
      ['Natural Top', NODE_COLOR['Natural Top']],
      ['Other moves', NODE_COLOR['Other']],
    ];
    legendEl.innerHTML = legendItems.map(([label, color]) =>
      `<div class="graph-legend-row">
         <div class="graph-legend-dot" style="background:${color}"></div>
         <span>${label}</span>
       </div>`
    ).join('');

    function getColor(name) {
      return NODE_COLOR[name] || NODE_COLOR['Other'];
    }

    const svg = d3.select(wrap).append('svg');
    const g   = svg.append('g');

    // zoom
    svg.call(d3.zoom().scaleExtent([0.2, 4]).on('zoom', e => g.attr('transform', e.transform)));

    // arrowhead markers (one per node color, to match edge color)
    const defs = svg.append('defs');
    const markerColors = [...new Set(GRAPH_DATA.nodes.map(n => getColor(n)))];
    for (const color of markerColors) {
      const safeId = 'arrow-' + color.replace('#','');
      defs.append('marker')
        .attr('id', safeId)
        .attr('viewBox', '0 -4 10 8')
        .attr('refX', 10).attr('refY', 0)
        .attr('markerWidth', 6).attr('markerHeight', 6)
        .attr('orient', 'auto')
        .append('path')
        .attr('d', 'M0,-4L10,0L0,4')
        .attr('fill', color);
    }

    let minWeight = 5;
    let showSelfLoops = true;

    function render() {
      g.selectAll('*').remove();

      const filteredEdges = GRAPH_DATA.edges.filter(e =>
        e.weight >= minWeight && (showSelfLoops || e.from !== e.to)
      );
      const activeNodeNames = new Set(filteredEdges.flatMap(e => [e.from, e.to]));
      const nodes = GRAPH_DATA.nodes
        .filter(n => activeNodeNames.has(n))
        .map(n => ({ id: n }));
      const nodeMap = Object.fromEntries(nodes.map(n => [n.id, n]));
      const links = filteredEdges
        .filter(e => e.from !== e.to)
        .map(e => ({ source: e.from, target: e.to, weight: e.weight }));
      const selfLoops = filteredEdges.filter(e => e.from === e.to);

      const maxEdgeW = Math.max(...filteredEdges.map(e => e.weight), 1);
      const edgeWidth = w => 1 + 6 * Math.sqrt(w / maxEdgeW);

      // ── simulation ────────────────────────────────────────────────────────
      if (simulation) simulation.stop();
      simulation = d3.forceSimulation(nodes)
        .force('link', d3.forceLink(links).id(d => d.id)
          .distance(d => 100 + 300 / Math.sqrt(d.weight))
          .strength(0.4))
        .force('charge', d3.forceManyBody().strength(-400))
        .force('center', d3.forceCenter(wrap.clientWidth / 2, wrap.clientHeight / 2))
        .force('collide', d3.forceCollide(d => nodeR(d.id) + 8));

      // ── draw links ────────────────────────────────────────────────────────
      // For bidirectional pairs, curve both edges so they don't overlap
      const pairSet = new Set(links.map(l =>
        [l.source, l.target].sort().join('|')
      ));
      const isBidi = (s, t) => {
        const key = [s, t].sort().join('|');
        return links.some(l => {
          const ls = typeof l.source === 'object' ? l.source.id : l.source;
          const lt = typeof l.target === 'object' ? l.target.id : l.target;
          return ls === t && lt === s;
        });
      };

      const link = g.append('g').selectAll('path')
        .data(links).join('path')
        .attr('fill', 'none')
        .attr('stroke', d => {
          const src = typeof d.source === 'object' ? d.source.id : d.source;
          return getColor(src);
        })
        .attr('stroke-opacity', 0.55)
        .attr('stroke-width', d => edgeWidth(d.weight))
        .attr('marker-end', d => {
          const src = typeof d.source === 'object' ? d.source.id : d.source;
          return `url(#arrow-${getColor(src).replace('#','')})`;
        })
        .on('mousemove', (event, d) => {
          const src = typeof d.source === 'object' ? d.source.id : d.source;
          const tgt = typeof d.target === 'object' ? d.target.id : d.target;
          showTooltip(event, `<b>${src}</b> → <b>${tgt}</b><br>count: ${d.weight}`);
        })
        .on('mouseleave', hideTooltip);

      // ── self-loop arcs ────────────────────────────────────────────────────
      const loopArc = g.append('g').selectAll('path')
        .data(selfLoops).join('path')
        .attr('fill', 'none')
        .attr('stroke', d => getColor(d.from))
        .attr('stroke-opacity', 0.6)
        .attr('stroke-width', d => edgeWidth(d.weight))
        .on('mousemove', (event, d) => {
          showTooltip(event, `<b>${d.from}</b> → self<br>count: ${d.weight}`);
        })
        .on('mouseleave', hideTooltip);

      // ── node groups ───────────────────────────────────────────────────────
      const node = g.append('g').selectAll('g')
        .data(nodes).join('g')
        .call(d3.drag()
          .on('start', (event, d) => {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x; d.fy = d.y;
          })
          .on('drag', (event, d) => { d.fx = event.x; d.fy = event.y; })
          .on('end', (event, d) => {
            if (!event.active) simulation.alphaTarget(0);
            d.fx = null; d.fy = null;
          })
        );

      node.append('circle')
        .attr('r', d => nodeR(d.id))
        .attr('fill', d => getColor(d.id))
        .attr('fill-opacity', 0.18)
        .attr('stroke', d => getColor(d.id))
        .attr('stroke-width', 2)
        .on('mousemove', (event, d) => {
          const out = GRAPH_DATA.edges
            .filter(e => e.from === d.id && e.weight >= minWeight)
            .sort((a, b) => b.weight - a.weight)
            .slice(0, 5)
            .map(e => `→ ${e.to}: ${e.weight}`).join('<br>');
          showTooltip(event, `<b>${d.id}</b><br>${out}`);
        })
        .on('mouseleave', hideTooltip);

      node.append('text')
        .attr('text-anchor', 'middle')
        .attr('dominant-baseline', 'central')
        .attr('font-size', d => Math.max(9, Math.min(13, nodeR(d.id) * 0.55)) + 'px')
        .attr('fill', d => getColor(d.id))
        .attr('pointer-events', 'none')
        .text(d => d.id);

      // ── tick ──────────────────────────────────────────────────────────────
      simulation.on('tick', () => {
        link.attr('d', d => {
          const sx = d.source.x, sy = d.source.y;
          const tx = d.target.x, ty = d.target.y;
          const tr = nodeR(d.target.id);
          const dx = tx - sx, dy = ty - sy;
          const dist = Math.sqrt(dx * dx + dy * dy) || 1;
          // end point: stop at node edge (account for arrowhead)
          const endX = tx - (dx / dist) * (tr + 10);
          const endY = ty - (dy / dist) * (tr + 10);
          // curve offset: perpendicular, stronger when bidirectional
          const bidir = isBidi(
            typeof d.source === 'object' ? d.source.id : d.source,
            typeof d.target === 'object' ? d.target.id : d.target
          );
          const offset = bidir ? 30 : 0;
          const cx = (sx + endX) / 2 - (dy / dist) * offset;
          const cy = (sy + endY) / 2 + (dx / dist) * offset;
          return `M${sx},${sy} Q${cx},${cy} ${endX},${endY}`;
        });

        loopArc.attr('d', d => {
          const n = nodeMap[d.from];
          if (!n) return '';
          const r = nodeR(d.from);
          const x = n.x, y = n.y;
          const sweep = r * 1.4;
          return `M ${x + r * 0.5},${y - r * 0.5}
                  C ${x + sweep * 2},${y - sweep * 2}
                    ${x + sweep * 2},${y + sweep}
                    ${x + r * 0.5},${y + r * 0.5}`;
        });

        node.attr('transform', d => `translate(${d.x},${d.y})`);
      });
    }

    // ── controls ─────────────────────────────────────────────────────────────
    const slider = document.getElementById('weight-slider');
    const weightVal = document.getElementById('weight-val');
    slider.addEventListener('input', () => {
      minWeight = +slider.value;
      weightVal.textContent = minWeight;
      render();
    });
    document.getElementById('selfloop-toggle').addEventListener('change', e => {
      showSelfLoops = e.target.checked;
      render();
    });

    // ── tooltip helpers ───────────────────────────────────────────────────────
    function showTooltip(event, html) {
      tooltip.innerHTML = html;
      tooltip.style.opacity = '1';
      const x = event.offsetX + 14, y = event.offsetY - 10;
      tooltip.style.left = x + 'px';
      tooltip.style.top  = y + 'px';
    }
    function hideTooltip() { tooltip.style.opacity = '0'; }

    render();
  }

  const BASE = 'https://huggingface.co/datasets/Rosie-Lab/compas3d/resolve/main';

  // ── sequence catalogue (only confirmed-annotated sequences) ─────────────────
  const sequences = [
    // Beginner — Pair 1
    { pair: 1, song: 1, take: 1, level: 'Beginner' },
    { pair: 1, song: 1, take: 2, level: 'Beginner' },
    { pair: 1, song: 2, take: 1, level: 'Beginner' },
    { pair: 1, song: 2, take: 2, level: 'Beginner' },
    { pair: 1, song: 3, take: 1, level: 'Beginner' },
    { pair: 1, song: 3, take: 2, level: 'Beginner' },
    { pair: 1, song: 4, take: 1, level: 'Beginner' },
    // Intermediate — Pair 2
    { pair: 2, song: 1, take: 1, level: 'Intermediate' },
    { pair: 2, song: 1, take: 2, level: 'Intermediate' },
    { pair: 2, song: 2, take: 1, level: 'Intermediate' },
    { pair: 2, song: 2, take: 2, level: 'Intermediate' },
    { pair: 2, song: 3, take: 1, level: 'Intermediate' },
    { pair: 2, song: 3, take: 2, level: 'Intermediate' },
    { pair: 2, song: 4, take: 1, level: 'Intermediate' },
    { pair: 2, song: 4, take: 2, level: 'Intermediate' },
    // Professional — Pair 5
    { pair: 5, song: 1, take: 1, level: 'Professional' },
    { pair: 5, song: 1, take: 2, level: 'Professional' },
    { pair: 5, song: 2, take: 1, level: 'Professional' },
    { pair: 5, song: 2, take: 2, level: 'Professional' },
  ];

  function seqId(s) { return `Pair${s.pair}_song${s.song}_take${s.take}`; }
  function seqUrl(s, ext) {
    const id = seqId(s);
    return `${BASE}/Pair${s.pair}/${id}/${id}.${ext}`;
  }

  // ── populate select ─────────────────────────────────────────────────────────
  const select = document.getElementById('seq-select');
  let lastLevel = null;
  for (const s of sequences) {
    if (s.level !== lastLevel) {
      const og = document.createElement('optgroup');
      og.label = s.level;
      select.appendChild(og);
      lastLevel = s.level;
    }
    const opt = document.createElement('option');
    opt.value = seqId(s);
    opt.textContent = `${seqId(s)}`;
    opt.dataset.pair = s.pair;
    opt.dataset.song = s.song;
    opt.dataset.take = s.take;
    select.lastChild.appendChild(opt);
  }

  // ── state ───────────────────────────────────────────────────────────────────
  const KNOWN = new Set(['Together', 'Separate_Leader', 'Separate_Follower', 'Errors']);
  let activeTracks = new Set(['Together', 'Separate_Leader', 'Separate_Follower']);
  let allAnnotations = [];   // parsed, all tracks
  let rowEls = [];           // DOM rows in order matching filtered annotations
  let filteredAnnotations = []; // currently visible
  let lastActiveRows = new Set();

  const player = document.getElementById('player');
  const nowMoves = document.getElementById('now-moves');
  const annotList = document.getElementById('annot-list');

  // ── track toggles ───────────────────────────────────────────────────────────
  document.querySelectorAll('.track-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const track = btn.dataset.track;
      if (activeTracks.has(track)) activeTracks.delete(track);
      else activeTracks.add(track);
      btn.classList.toggle('active', activeTracks.has(track));
      rebuildList();
    });
  });

  // ── compact notation ─────────────────────────────────────────────────────────

  const HOLD_SYM = {
    open:     { sym: '○', label: 'open hold',       tip: '○ open hold — one-hand connection (leader R → follower L)' },
    crossed:  { sym: '✕', label: 'crossed hold',    tip: '✕ crossed hold — hands crossed over, creates tension' },
    closed:   { sym: '●', label: 'closed hold',     tip: '● closed hold — standard ballroom frame' },
    hl_left:  { sym: '⊏', label: 'left hammerlock', tip: '⊏ left hammerlock — follower\'s left arm pinned behind back' },
    hl_right: { sym: '⊐', label: 'right hammerlock',tip: '⊐ right hammerlock — follower\'s right arm pinned behind back' },
    embrace:  { sym: '∞', label: 'embrace',         tip: '∞ embrace — both arms, follower facing away (Titanic / shadow frame)' },
    shadow:   { sym: '≡', label: 'shadow',          tip: '≡ shadow — side by side, same direction, matching orientation' },
  };

  const CN_MOVES = {
    basic:       { abbr: 'B',   tip: 'B — Basic step: rock forward-back-pause over 8 counts' },
    side_basic:  { abbr: 'sB',  tip: 'sB — Side basic step: basic step moving laterally' },
    cross_basic: { abbr: 'xB',  tip: 'xB — Cross-back basic: back step crossing behind' },
    back_basic:  { abbr: 'bB',  tip: 'bB — Back basic step: weight rock backward' },
    xbl:         { abbr: 'X',   tip: 'X — Cross Body Lead: leader guides follower across the slot' },
    turn:        { abbr: 'T',   tip: 'T — Isolated turn (not attached to an XBL)' },
    copa:        { abbr: 'Cp',  tip: 'Cp — Copa: pivot that redirects follower, common phrase boundary' },
    comb:        { abbr: 'Cm',  tip: 'Cm — Comb: leader\'s hand drawn over follower\'s head' },
    ht:          { abbr: 'Ht',  tip: 'Ht — Hand throw: dramatic release/throw of one or both hands' },
    nt:          { abbr: 'Nt',  tip: 'Nt — Natural top: continuous circular motion around a pivot' },
    walks:       { abbr: 'W',   tip: 'W — Walks around: follower walks in a circle around leader' },
    suzyq:       { abbr: 'Sq',  tip: 'Sq — Suzy Q: classic footwork side-to-side syncopated pattern' },
    check:       { abbr: 'Ck',  tip: 'Ck — Check: halt step to redirect weight or pause momentum' },
    openbreak:   { abbr: 'Ob',  tip: 'Ob — Open break: both partners step apart, creating space' },
    lasso:       { abbr: 'La',  tip: 'La — Lasso: overhead circular arm motion (rope-like)' },
    armlock:     { abbr: 'Al',  tip: 'Al — Arm lock: arm held to create tension before a release/turn' },
    cod:         { abbr: 'CoD', tip: 'CoD — Change of Directions: partners swap position in the slot' },
    enchufla:    { abbr: 'Enc', tip: 'Enc — Enchufla: Cuban pattern where partners rotate places' },
    bodyroll:    { abbr: 'Br',  tip: 'Br — Body roll: fluid wave motion through the torso' },
    other:       { abbr: '?',   tip: '? — Unclassified or rare move' },
  };

  const CN_COLORS = {
    xbl: '#e05a2b', basic: '#7880a0', side_basic: '#7880a0',
    cross_basic: '#7880a0', back_basic: '#7880a0', turn: '#4a9eff',
    copa: '#c77dff', comb: '#f0c040', ht: '#ff6b6b', nt: '#40c8a8',
    walks: '#50c878', suzyq: '#ffaa40', check: '#80c8ff',
    openbreak: '#ff9090', lasso: '#ff80c0', armlock: '#c0a060',
    cod: '#9090ff', enchufla: '#ff60a0', bodyroll: '#60c0a0',
  };

  function cnMoveType(raw) {
    const t = raw.toLowerCase();
    if (/\bside basic\b/.test(t))                   return 'side_basic';
    if (/\bcross.?back basic\b/.test(t))             return 'cross_basic';
    if (/\bback basic\b/.test(t))                    return 'back_basic';
    if (/\bbasic step\b/.test(t))                    return 'basic';
    if (/\bxbl\b/.test(t))                           return 'xbl';
    if (/\bcopa\b/.test(t))                          return 'copa';
    if (/\bnatural top\b/.test(t))                   return 'nt';
    if (/\bsuzy q\b/.test(t))                        return 'suzyq';
    if (/\bwalk.{0,10}around\b/.test(t))             return 'walks';
    if (/\bchange of direction\b/.test(t))           return 'cod';
    if (/\benchufla\b/.test(t))                      return 'enchufla';
    if (/\b(right.*throw|left.*throw|double.*throw|single.*throw|hand throw)\b/.test(t)) return 'ht';
    if (/\bbody roll\b/.test(t))                     return 'bodyroll';
    if (/\bcomb\b/.test(t))                          return 'comb';
    if (/\bcheck\b/.test(t))                         return 'check';
    if (/\blasso\b/.test(t))                         return 'lasso';
    if (/\barm lock\b/.test(t))                      return 'armlock';
    if (/\bopen break\b/.test(t))                    return 'openbreak';
    if (/\bright turn\b|\bleft turn\b/.test(t))      return 'turn';
    return 'other';
  }

  function cnInferHoldOut(raw, holdIn) {
    const t = raw.toLowerCase();
    if (/\bcrossed hold\b|\bcrossed hand\b/.test(t))              return 'crossed';
    if (/\bleft hl\b|\bleft hammerlock\b/.test(t))                return 'hl_left';
    if (/\bright hl\b|\bright hammerlock\b/.test(t))              return 'hl_right';
    if (/\bnormal closed hold\b|\bnormal closed hand\b|\bclosed hold\b/.test(t)) return 'closed';
    if (/\bnormal open hold\b|\bopen hold\b|\bopen hand\b/.test(t)) return 'open';
    if (/\bembrace\b/.test(t))                                    return 'embrace';
    if (/\bshadow\b/.test(t))                                     return 'shadow';
    if (/\bxbl\b/.test(t))                                        return 'open';
    if (/\bthrow\b/.test(t))                                      return 'crossed';
    if (/ends with comb|comb on/.test(t))                         return 'open';
    return holdIn;
  }

  function computeHoldStates(annotations) {
    let hold = 'open';
    for (const ann of annotations) {
      if (ann.category !== 'Together') continue;
      ann.holdIn  = hold;
      ann.holdOut = cnInferHoldOut(ann.description, hold);
      hold = ann.holdOut;
    }
  }

  function buildCN(ann) {
    if (ann.holdIn === undefined) return '';
    const key    = cnMoveType(ann.description);
    const info   = CN_MOVES[key] ?? CN_MOVES.other;
    const color  = CN_COLORS[key] ?? '#7880a0';
    const holdIn = ann.holdIn, holdOut = ann.holdOut;
    const t = ann.description.toLowerCase();

    // turn arrows
    let fTurn = null, lTurn = null;
    if      (/double.{0,10}right.{0,10}(turn|follower)/.test(t)) fTurn = '↻↻';
    else if (/double.{0,10}left.{0,10}(turn|follower)/.test(t))  fTurn = '↺↺';
    else if (/right.{0,30}follower|follower.{0,30}right|outside.{0,10}turn/.test(t)) fTurn = '↻';
    else if (/left.{0,30}follower|follower.{0,30}left|inside.{0,10}turn/.test(t))    fTurn = '↺';
    if (/right.{0,30}leader|leader.{0,30}right/.test(t)) lTurn = '↻';
    else if (/left.{0,30}leader|leader.{0,30}left/.test(t))      lTurn = '↺';

    // ending decorator
    let dec = null;
    if (key !== 'comb'  && /\bcomb\b/.test(t))   dec = '·Cm';
    if (key !== 'check' && /\bcheck\b/.test(t))  dec = '·Ck';
    if (/\bbreak\b/.test(t))                     dec = '·Ob';
    if (key !== 'ht'    && /\bthrow\b/.test(t))  dec = '·Ht';
    if (/\bdrop\b/.test(t))                      dec = '·↓';

    const fTurnTip = { '↺':'follower: left (inside) turn', '↻':'follower: right (outside) turn',
                       '↺↺':'follower: double left turn',  '↻↻':'follower: double right turn' };
    const lTurnTip = { '↺':'leader: left turn', '↻':'leader: right turn' };
    const decTip   = { '·Cm':'ends with a comb (hand over head)', '·Ck':'ends with a check (weight redirect)',
                       '·Ob':'ends with an open break',           '·Ht':'ends with a hand throw',
                       '·↓':'ends with a hand drop' };

    let h = '';
    // entry hold chip: show when not in default open
    if (holdIn !== 'open') {
      const hd = HOLD_SYM[holdIn] ?? { sym: holdIn, tip: holdIn };
      h += `<span class="cn-hold ${holdIn}" data-tip="${hd.tip}">${hd.sym}</span>`;
    }
    h += `<span class="cn-move" style="color:${color}" data-tip="${info.tip}">${info.abbr}</span>`;
    if (fTurn) h += `<span class="cn-fturn" data-tip="${fTurnTip[fTurn] ?? fTurn}">${fTurn}</span>`;
    if (lTurn) h += `<span class="cn-lturn" data-tip="${lTurnTip[lTurn] ?? lTurn}">${lTurn}</span>`;
    // exit hold chip: show when hold changes
    if (holdIn !== holdOut) {
      const hd = HOLD_SYM[holdOut] ?? { sym: holdOut, tip: holdOut };
      h += `<span class="cn-transition" data-tip="hold state changes to →">→</span>`;
      h += `<span class="cn-hold ${holdOut}" data-tip="${hd.tip}">${hd.sym}</span>`;
    }
    if (dec) h += `<span class="cn-dec" data-tip="${decTip[dec] ?? dec}">${dec}</span>`;

    return `<div class="cn">${h}</div>`;
  }

  // ── parse annotations ───────────────────────────────────────────────────────
  function parseAnnotations(text) {
    const rows = [];
    for (const line of text.split('\n')) {
      const cols = line.split('\t');
      if (cols.length < 9) continue;
      const category = cols[0].trim();
      if (!KNOWN.has(category)) continue;
      const startSec = parseFloat(cols[3]);
      const endSec   = parseFloat(cols[5]);
      if (isNaN(startSec) || isNaN(endSec)) continue;
      rows.push({ category, startSec, endSec,
                  startTs: cols[2].trim(), description: cols[8].trim() });
    }
    return rows.sort((a, b) => a.startSec - b.startSec || a.category.localeCompare(b.category));
  }

  function trackClass(category) {
    return { Together: 'together', Separate_Leader: 'leader',
             Separate_Follower: 'follower', Errors: 'error' }[category] ?? '';
  }

  function formatTime(sec) {
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60);
    return `${m}:${String(s).padStart(2, '0')}`;
  }

  // ── build annotation list ───────────────────────────────────────────────────
  function rebuildList() {
    filteredAnnotations = allAnnotations.filter(a => activeTracks.has(a.category));
    rowEls = [];
    lastActiveRows.clear();
    annotList.innerHTML = '';

    if (!filteredAnnotations.length) {
      annotList.innerHTML = '<div class="empty-state">No annotations for selected tracks.</div>';
      return;
    }

    for (const ann of filteredAnnotations) {
      const cls = trackClass(ann.category);
      const div = document.createElement('div');
      div.className = `annot-row ${cls}`;
      div.innerHTML = `
        <span class="annot-time">${formatTime(ann.startSec)}</span>
        <div class="annot-body">
          <span class="annot-text">${badge(ann.category)}${escHtml(ann.description)}</span>
          ${ann.category === 'Together' ? buildCN(ann) : ''}
        </div>
      `;
      div.addEventListener('click', () => { player.currentTime = ann.startSec; player.play(); });
      annotList.appendChild(div);
      rowEls.push(div);
    }

    // re-apply current time highlighting
    updateHighlight(player.currentTime);
  }

  function badge(category) {
    if (category === 'Separate_Leader')   return '<span class="annot-badge badge-leader">Leader</span>';
    if (category === 'Separate_Follower') return '<span class="annot-badge badge-follower">Follower</span>';
    if (category === 'Errors')            return '<span class="annot-badge badge-error">Error</span>';
    return '';
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── beat counter ─────────────────────────────────────────────────────────────
  let beatBars = [];   // [{start, end, beatDur}] one per Together phrase
  let on2Mode  = false;
  let lastBeat = -1;

  const beatBar    = document.getElementById('beat-bar');
  const beatPips   = document.getElementById('beat-pips');
  const on2Toggle  = document.getElementById('on2-toggle');

  // Build beat pip elements (1–8) once
  for (let b = 1; b <= 8; b++) {
    const pip = document.createElement('div');
    pip.className = 'beat-pip' + (b === 4 || b === 8 ? ' pause' : '');
    pip.textContent = b;
    pip.dataset.beat = b;
    beatPips.appendChild(pip);
  }
  const pipEls = Array.from(beatPips.querySelectorAll('.beat-pip'));

  function applyOn2Style() {
    pipEls.forEach(p => {
      const b = +p.dataset.beat;
      p.classList.toggle('on2-accent', on2Mode && b === 2);
    });
    on2Toggle.textContent = on2Mode ? 'on-2' : 'on-1';
    on2Toggle.classList.toggle('on2', on2Mode);
  }

  on2Toggle.addEventListener('click', () => {
    on2Mode = !on2Mode;
    applyOn2Style();
  });

  function buildBeatBars(annotations) {
    beatBars = annotations
      .filter(a => a.category === 'Together')
      .sort((a, b) => a.startSec - b.startSec)
      .map(a => ({ start: a.startSec, end: a.endSec,
                   beatDur: (a.endSec - a.startSec) / 8 }));
    beatBar.classList.toggle('visible', beatBars.length > 0);
    lastBeat = -1;
    pipEls.forEach(p => p.classList.remove('active'));
    applyOn2Style();
  }

  function updateBeatCounter(t) {
    // Binary search for the phrase containing t
    let lo = 0, hi = beatBars.length - 1, bar = null;
    while (lo <= hi) {
      const mid = (lo + hi) >> 1;
      const b = beatBars[mid];
      if (t < b.start) hi = mid - 1;
      else if (t >= b.end) lo = mid + 1;
      else { bar = b; break; }
    }
    const beat = bar ? Math.floor((t - bar.start) / bar.beatDur) + 1 : 0;
    const clamped = Math.min(beat, 8);
    if (clamped === lastBeat) return;
    lastBeat = clamped;
    pipEls.forEach(p => p.classList.toggle('active', +p.dataset.beat === clamped));
  }

  // ── timeupdate ──────────────────────────────────────────────────────────────
  player.addEventListener('timeupdate', () => {
    updateHighlight(player.currentTime);
    updateBeatCounter(player.currentTime);
  });

  function updateHighlight(t) {
    const newActive = new Set();
    const activeAnns = [];

    for (let i = 0; i < filteredAnnotations.length; i++) {
      const a = filteredAnnotations[i];
      if (a.startSec <= t && t < a.endSec) {
        newActive.add(i);
        activeAnns.push(a);
      }
    }

    // update row classes only when the active set changes
    if (!setsEqual(newActive, lastActiveRows)) {
      for (const i of lastActiveRows) rowEls[i]?.classList.remove('active');
      for (const i of newActive)      rowEls[i]?.classList.add('active');
      lastActiveRows = newActive;

      // scroll first active row into view (scroll list container directly
      // to avoid scrollIntoView jumping the whole page on mobile)
      const firstIdx = Math.min(...newActive);
      if (rowEls[firstIdx]) {
        annotList.scrollTop = rowEls[firstIdx].offsetTop - annotList.offsetTop;
      }

      // update now-playing panel
      renderNow(activeAnns);
    }
  }

  function renderNow(anns) {
    if (!anns.length) {
      nowMoves.innerHTML = '<span style="color:var(--muted);font-size:.9rem">—</span>';
      return;
    }
    nowMoves.innerHTML = anns.map(a => {
      const cls = trackClass(a.category);
      const prefix = a.category === 'Separate_Leader' ? '<small style="opacity:.6">Leader · </small>'
                   : a.category === 'Separate_Follower' ? '<small style="opacity:.6">Follower · </small>'
                   : a.category === 'Errors' ? '<small style="opacity:.6">Error · </small>'
                   : '';
      const cn = a.category === 'Together' ? buildCN(a) : '';
      return `<div class="now-move ${cls}">${prefix}${escHtml(a.description)}${cn}</div>`;
    }).join('');
  }

  function setsEqual(a, b) {
    if (a.size !== b.size) return false;
    for (const v of a) if (!b.has(v)) return false;
    return true;
  }

  // ── load sequence ───────────────────────────────────────────────────────────
  select.addEventListener('change', async () => {
    const opt = select.selectedOptions[0];
    if (!opt.dataset.pair) return;

    const s = { pair: +opt.dataset.pair, song: +opt.dataset.song, take: +opt.dataset.take };
    history.replaceState(null, '', '?seq=' + seqId(s));

    // set video
    player.src = seqUrl(s, 'mp4');
    player.load();

    // reset UI
    allAnnotations = [];
    annotList.innerHTML = '<div class="empty-state">Loading annotations…</div>';
    nowMoves.innerHTML = '<span id="status" style="color:var(--muted);font-size:.9rem">Loading…</span>';

    try {
      const res = await fetch(seqUrl(s, 'txt'));
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const text = await res.text();
      allAnnotations = parseAnnotations(text);
      computeHoldStates(allAnnotations);
      buildBeatBars(allAnnotations);
      rebuildList();
      nowMoves.innerHTML = '<span style="color:var(--muted);font-size:.9rem">Press play to begin.</span>';
    } catch (err) {
      annotList.innerHTML = `<div class="empty-state">Could not load annotations.<br><small>${err.message}</small></div>`;
      nowMoves.innerHTML = '<span style="color:var(--error);font-size:.85rem">Annotation load failed.</span>';
    }
  });

  // ── restore or default sequence from URL ────────────────────────────────────
  {
    const params = new URLSearchParams(location.search);
    const seq = params.get('seq') || 'Pair2_song2_take1';
    const match = [...select.options].find(o => o.value === seq);
    if (match) { match.selected = true; select.dispatchEvent(new Event('change')); }
  }

  // ── shared [data-tip] tooltip ─────────────────────────────────────────────
  const appTooltip = document.getElementById('app-tooltip');

  function tipOn(e) {
    const el = e.target.closest('[data-tip]');
    if (!el) { appTooltip.style.opacity = '0'; return; }
    appTooltip.textContent = el.dataset.tip;
    appTooltip.style.opacity = '1';
    positionTip(e);
  }
  function tipMove(e) {
    if (appTooltip.style.opacity === '1') positionTip(e);
  }
  function tipOff() { appTooltip.style.opacity = '0'; }
  function positionTip(e) {
    const x = e.clientX + 14, y = e.clientY - 36;
    appTooltip.style.left = Math.min(x, window.innerWidth  - appTooltip.offsetWidth  - 8) + 'px';
    appTooltip.style.top  = Math.max(y, 4) + 'px';
  }

  for (const el of [annotList, document.getElementById('now-moves')]) {
    el.addEventListener('mouseover',  tipOn);
    el.addEventListener('mousemove',  tipMove);
    el.addEventListener('mouseleave', tipOff);
  }
</script>
</body>
</html>
